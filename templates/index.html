<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Leaf Disease Classifier</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container py-5">

    <div class="card shadow-lg p-4">

        <h1 class="text-center text-success mb-2">
            🥔 Potato Leaf Disease Classifier
        </h1>

        <p class="text-center text-muted mb-4">
            Klasifikasi Penyakit Daun Kentang menggunakan Deep Learning
        </p>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">

                <label class="form-label">
                    Pilih Model
                </label>

                <select class="form-select" name="model">

                    <option value="mobilenet">
                        MobileNetV2
                    </option>

                    <option value="efficientnet">
                        EfficientNetB0
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Upload Gambar
                </label>

                <input
                    class="form-control"
                    type="file"
                    name="image"
                    accept="image/*"
                    required>

            </div>

            <button class="btn btn-success w-100">

                Deteksi Penyakit

            </button>

        </form>

        {% if image %}

        <hr>

        <div class="text-center">

            <img
                src="{{ image }}"
                class="img-fluid rounded shadow preview">

        </div>

        {% endif %}

        {% if result %}

        <hr>

        <div class="result-card">

            <h3 class="text-success">

                {{ result.class }}

            </h3>

            <h5>

                Confidence :
                {{ result.confidence }} %

            </h5>

            <p>

                <strong>Deskripsi</strong><br>

                {{ result.description }}

            </p>

            <p>

                <strong>Saran</strong><br>

                {{ result.solution }}

            </p>

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
